server {
    listen 80;
    server_name fuegodance.cl localhost;

    # Allow large video uploads (up to 200MB)
    client_max_body_size 200M;

    # Frontend — React build estático
    location / {
        root /usr/share/nginx/html;
        index index.html;
        try_files $uri $uri/ /index.html;
    }

    # Backend API proxy — extended timeouts for video uploads
    location /api/ {
        proxy_pass http://fuego-dance-api:8000/api/;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;

        # Timeouts for large uploads + ffprobe processing
        proxy_connect_timeout 300s;
        proxy_send_timeout 300s;
        proxy_read_timeout 300s;

        # Disable request buffering so progress events fire in real-time
        proxy_request_buffering off;
    }

    # Gzip
    gzip on;
    gzip_types text/plain text/css application/json application/javascript text/xml application/xml text/javascript image/svg+xml;
    gzip_min_length 256;

    # Cache static assets — ONLY from the React build, NOT from /api/
    location ~* ^/(assets|favicon\.ico|logo.*\.jpg)\.(.*)$ {
        root /usr/share/nginx/html;
        expires 1y;
        add_header Cache-Control "public, immutable";
    }
}
